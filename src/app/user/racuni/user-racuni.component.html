<div class="racuni-page">
  <div class="header-row">
    <h1>Moji računi</h1>
  </div>

  @if (errorMessage()) {
    <div class="error-banner">
      <mat-icon>error_outline</mat-icon>
      <span>{{ errorMessage() }}</span>
    </div>
  }

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else {
    <div class="table-container">
      <table mat-table [dataSource]="racuni()" class="racuni-table">
        <ng-container matColumnDef="datum">
          <th mat-header-cell *matHeaderCellDef>Datum</th>
          <td mat-cell *matCellDef="let racun">{{ racun.datum }}</td>
        </ng-container>

        <ng-container matColumnDef="ukupnaCijena">
          <th mat-header-cell *matHeaderCellDef>Ukupna cijena</th>
          <td mat-cell *matCellDef="let racun">{{ racun.ukupnaCijena }}</td>
        </ng-container>

        <ng-container matColumnDef="napomena">
          <th mat-header-cell *matHeaderCellDef>Napomena</th>
          <td mat-cell *matCellDef="let racun">{{ racun.napomena }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      @if (racuni().length === 0) {
        <p class="empty-state">Nemate računa.</p>
      }
    </div>
  }
</div>
